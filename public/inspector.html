<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sprite Inspector</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a1a; color: #ddd;
    font-family: monospace; font-size: 12px;
    display: flex; height: 100vh; overflow: hidden;
}

/* ── Left panel ── */
#left {
    width: 320px; flex-shrink: 0;
    background: #222; border-right: 1px solid #444;
    display: flex; flex-direction: column; overflow: hidden;
}

.section { padding: 12px; border-bottom: 1px solid #333; }
.section h3 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 8px; }

input[type=file]  { color: #ccc; font-size: 11px; width: 100%; }
input[type=range] { width: 100%; margin-top: 4px; }
input[type=text]  { width: 100%; background: #333; border: 1px solid #555; color: #fff; padding: 4px 6px; font-family: monospace; font-size: 12px; }
button { padding: 6px 12px; background: #333; border: 1px solid #555; color: #ccc; font-family: monospace; font-size: 11px; cursor: pointer; }
button:hover { background: #444; }

#zoom-value { color: #fff; margin-left: 6px; }
#coords     { font-size: 13px; color: #4af; letter-spacing: 1px; margin-bottom: 6px; }

/* Selection */
#sel-display { background: #1a2a1a; border: 1px solid #3a5a3a; padding: 8px; line-height: 2; color: #8f8; }
#sel-display span { color: #fff; }
#sel-json { margin-top: 6px; color: #4af; font-size: 11px; word-break: break-all; }

/* Preview */
#preview-wrap { padding: 8px 12px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
#preview { image-rendering: pixelated; background: repeating-conic-gradient(#333 0% 25%, #2a2a2a 0% 50%) 0 0 / 8px 8px; border: 1px solid #444; }

/* Strip label input */
#save-row { display: flex; gap: 6px; align-items: center; padding: 8px 12px; border-bottom: 1px solid #333; }
#save-row input { flex: 1; }
#save-row button { flex-shrink: 0; }

/* Auto-detect results */
#auto-results {
    flex: 1; overflow-y: auto; padding: 8px 12px;
}

.strip-entry {
    background: #1a1a2a; border: 1px solid #334; border-radius: 2px;
    padding: 6px 8px; margin-bottom: 6px; cursor: pointer; transition: background 0.1s;
}
.strip-entry:hover { background: #222244; }
.strip-entry .strip-label { color: #4af; font-size: 10px; letter-spacing: 1px; }
.strip-entry .strip-json  { color: #8f8; font-size: 11px; margin-top: 2px; word-break: break-all; }
.strip-entry .hint        { color: #555; font-size: 9px; float: right; }

#auto-actions { padding: 8px 12px; border-top: 1px solid #333; display: flex; gap: 6px; }
#auto-actions button { flex: 1; }

/* ── Right: sheet canvas ── */
#right { flex: 1; overflow: auto; position: relative; background: #111; cursor: crosshair; }
#sheet  { display: block; image-rendering: pixelated; }
#overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="left">

    <div class="section">
        <h3>Sheet</h3>
        <input type="file" id="file-input" accept="image/*">
        <div style="margin-top:10px;">
            <label>Zoom <span id="zoom-value">4×</span></label>
            <input type="range" id="zoom" min="1" max="16" value="4">
        </div>
        <div style="margin-top:8px; display:flex; gap:6px; align-items:center;">
            <button onclick="autoDetect()">Auto-detect strips</button>
            <label style="color:#888; font-size:10px; white-space:nowrap;">
                threshold
                <input type="number" id="threshold" value="2" min="0" max="20"
                    style="width:40px; background:#333; border:1px solid #555; color:#fff; padding:2px 4px; font-family:monospace; font-size:11px; margin-left:4px;">
                px
            </label>
        </div>
    </div>

    <div class="section">
        <h3>Cursor</h3>
        <div id="coords">x: – &nbsp; y: –</div>
    </div>

    <div class="section">
        <h3>Selection</h3>
        <div style="display:flex; gap:6px; margin-bottom:8px;">
            <button id="btn-base"   onclick="setMode('base')"   style="flex:1; border-color:#4af; color:#4af;">1. Select Base</button>
            <button id="btn-armour" onclick="setMode('armour')" style="flex:1;">2. Select Armour</button>
        </div>
        <div style="font-size:10px; color:#888; margin-bottom:6px;" id="mode-hint">Drag to select the BASE layer</div>
        <div id="sel-base"   style="color:#4af; font-size:11px; margin-bottom:4px;">base:   –</div>
        <div id="sel-armour" style="color:#fa0; font-size:11px;">armour: –</div>
    </div>

    <div id="preview-wrap">
        <canvas id="preview" width="50" height="50"></canvas>
        <div style="color:#888; font-size:10px;" id="preview-label">Preview</div>
    </div>

    <div id="save-row">
        <input type="text" id="strip-label" placeholder="Position name (e.g. Lineman)">
        <button onclick="saveManual()">Save</button>
    </div>

    <div id="auto-results"></div>

    <div id="auto-actions">
        <button onclick="copyAll()">Copy all JSON</button>
        <button onclick="clearResults()">Clear</button>
    </div>
</div>

<div id="right">
    <canvas id="sheet"></canvas>
    <canvas id="overlay"></canvas>
</div>

<script>
const sheetCanvas   = document.getElementById('sheet');
const overlayCanvas = document.getElementById('overlay');
const previewCanvas = document.getElementById('preview');
const sCtx = sheetCanvas.getContext('2d');
const oCtx = overlayCanvas.getContext('2d');
const pCtx = previewCanvas.getContext('2d');

let img      = null;
let zoom     = 4;
let filename = '';
let drag     = null;
let sel      = null;   // current drag selection
let selBase   = null;  // committed base rect
let selArmour = null;  // committed armour rect
let mode      = 'base'; // 'base' | 'armour'
let entries  = [];

function setMode(m) {
    mode = m;
    document.getElementById('btn-base').style.cssText   = m === 'base'   ? 'flex:1;border-color:#4af;color:#4af;' : 'flex:1;';
    document.getElementById('btn-armour').style.cssText = m === 'armour' ? 'flex:1;border-color:#fa0;color:#fa0;' : 'flex:1;';
    document.getElementById('mode-hint').textContent =
        m === 'base' ? 'Drag to select the BASE layer' : 'Drag to select the ARMOUR layer';
}

// ── Load image ────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    filename = file.name;
    const url = URL.createObjectURL(file);
    const image = new Image();
    image.onload = () => { img = image; draw(); };
    image.src = url;
});

document.getElementById('zoom').addEventListener('input', e => {
    zoom = parseInt(e.target.value);
    document.getElementById('zoom-value').textContent = zoom + '×';
    if (img) draw();
});

function draw() {
    const w = img.width * zoom, h = img.height * zoom;
    sheetCanvas.width = overlayCanvas.width  = w;
    sheetCanvas.height = overlayCanvas.height = h;
    overlayCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
    sCtx.imageSmoothingEnabled = false;
    sCtx.drawImage(img, 0, 0, w, h);
    drawGrid();
    redrawOverlay();
}

function drawGrid() {
    sCtx.save();
    sCtx.strokeStyle = 'rgba(255,255,255,0.05)';
    sCtx.lineWidth = 0.5;
    for (let x = 0; x <= img.width; x++) {
        sCtx.beginPath(); sCtx.moveTo(x*zoom, 0); sCtx.lineTo(x*zoom, img.height*zoom); sCtx.stroke();
    }
    for (let y = 0; y <= img.height; y++) {
        sCtx.beginPath(); sCtx.moveTo(0, y*zoom); sCtx.lineTo(img.width*zoom, y*zoom); sCtx.stroke();
    }
    sCtx.restore();
}

// ── Mouse ─────────────────────────────────────────────────────────
const right = document.getElementById('right');

right.addEventListener('mousemove', e => {
    if (!img) return;
    const { ix, iy } = imgCoords(e);
    document.getElementById('coords').innerHTML = `x: ${ix} &nbsp; y: ${iy}`;
    if (drag) {
        sel = {
            x: Math.min(drag.sx, ix), y: Math.min(drag.sy, iy),
            w: Math.abs(ix - drag.sx) + 1, h: Math.abs(iy - drag.sy) + 1,
        };
        updateSelUI(); redrawOverlay(); updatePreview();
    }
});

right.addEventListener('mousedown', e => {
    if (!img) return;
    const { ix, iy } = imgCoords(e);
    drag = { sx: ix, sy: iy };
    sel  = { x: ix, y: iy, w: 1, h: 1 };
});

right.addEventListener('mouseup', () => {
    if (drag && sel) {
        if (mode === 'base')   { selBase   = { ...sel }; setMode('armour'); }
        else                   { selArmour = { ...sel }; }
        updateSelUI();
    }
    drag = null;
    sel  = null;
    redrawOverlay();
});
right.addEventListener('mouseleave', () => { drag = null; });

function imgCoords(e) {
    const rect = sheetCanvas.getBoundingClientRect();
    return {
        ix: Math.min(img.width  - 1, Math.max(0, Math.floor((e.clientX - rect.left)  / zoom))),
        iy: Math.min(img.height - 1, Math.max(0, Math.floor((e.clientY - rect.top) / zoom))),
    };
}

function drawRect(ctx, r, stroke, fill) {
    ctx.save();
    ctx.strokeStyle = stroke; ctx.lineWidth = 1;
    ctx.strokeRect(r.x*zoom + 0.5, r.y*zoom + 0.5, r.w*zoom, r.h*zoom);
    ctx.fillStyle = fill;
    ctx.fillRect(r.x*zoom, r.y*zoom, r.w*zoom, r.h*zoom);
    ctx.restore();
}

function redrawOverlay() {
    oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    if (selBase)   drawRect(oCtx, selBase,   '#4af', 'rgba(68,170,255,0.10)');
    if (selArmour) drawRect(oCtx, selArmour, '#fa0', 'rgba(255,170,0,0.10)');
    if (sel) {
        const isBase = mode === 'base';
        drawRect(oCtx, sel, isBase ? '#4af' : '#fa0', isBase ? 'rgba(68,170,255,0.15)' : 'rgba(255,170,0,0.15)');
    }
}

function updateSelUI() {
    const fmt = r => r ? `x:${r.x} y:${r.y} w:${r.w} h:${r.h}` : '–';
    document.getElementById('sel-base').textContent   = 'base:   ' + fmt(selBase);
    document.getElementById('sel-armour').textContent = 'armour: ' + fmt(selArmour);
}

function updatePreview() {
    if (!img) return;
    const base   = mode === 'base' ? sel : selBase;
    const armour = mode === 'armour' ? sel : null;
    if (!base) return;

    const S = 4;
    const W = Math.max(base.w, armour ? armour.w : 0);
    const H = Math.max(base.h, armour ? armour.h : 0);
    previewCanvas.width  = W * S;
    previewCanvas.height = H * S;
    pCtx.imageSmoothingEnabled = false;
    pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    pCtx.drawImage(img, base.x, base.y, base.w, base.h, 0, 0, base.w*S, base.h*S);
    if (armour)
        pCtx.drawImage(img, armour.x, armour.y, armour.w, armour.h, 0, 0, armour.w*S, armour.h*S);
}

// ── Manual save ───────────────────────────────────────────────────
function saveManual() {
    if (!selBase || !selArmour) return;
    const label = document.getElementById('strip-label').value.trim() || 'sprite';
    entries.push({ label, sheet: `assets/sprites/${filename}`, base: selBase, armour: selArmour });
    document.getElementById('strip-label').value = '';
    // Reset for next sprite
    selBase = selArmour = null;
    sel = null;
    setMode('base');
    redrawOverlay();
    updateSelUI();
    renderEntries();
}

document.getElementById('strip-label').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveManual();
});

// ── Auto-detect ───────────────────────────────────────────────────
// Reads pixels via an offscreen canvas, finds the vertical split and
// all horizontal strips of non-transparent pixels automatically.

function autoDetect() {
    if (!img) return;

    const w = img.width, h = img.height;
    const off = new OffscreenCanvas(w, h);
    const ctx = off.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const data = ctx.getImageData(0, 0, w, h).data;

    const threshold = parseInt(document.getElementById('threshold').value) || 0;
    const alpha = (x, y) => data[(y * w + x) * 4 + 3];
    const rowPixels = y => { let n = 0; for (let x = 0; x < w; x++) if (alpha(x,y) > 0) n++; return n; };
    const colPixels = x => { let n = 0; for (let y = 0; y < h; y++) if (alpha(x,y) > 0) n++; return n; };
    const rowEmpty = y => rowPixels(y) <= threshold;
    const colEmpty = x => colPixels(x) <= threshold;

    // Find vertical split (first fully-transparent column)
    let split = null;
    for (let x = 1; x < w - 1; x++) {
        if (colEmpty(x)) { split = x; break; }
    }
    const spriteW = split !== null ? split : w;

    // Find horizontal strips
    const strips = [];
    let inStrip = false, start = 0;
    for (let y = 0; y <= h; y++) {
        const empty = y === h || rowEmpty(y);
        if (!empty && !inStrip) { start = y; inStrip = true; }
        if (empty && inStrip)   { strips.push({ y: start, h: y - start }); inStrip = false; }
    }

    // Find armour x: first non-empty column after the split gap
    let armourX = split !== null ? split + 1 : spriteW;
    for (let x = armourX; x < w; x++) {
        if (!colEmpty(x)) { armourX = x; break; }
    }
    const armourW = w - armourX;

    const newEntries = strips.map((s, i) => ({
        label:  `Strip ${i}`,
        sheet:  `assets/sprites/${filename}`,
        base:   { x: 0,       y: s.y, w: spriteW, h: s.h },
        armour: { x: armourX, y: s.y, w: armourW,  h: s.h },
    }));

    entries = [...entries, ...newEntries];
    renderEntries();

    // Highlight all detected strips on the sheet
    oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    const colors = ['#f04','#0af','#0f8','#fa0','#a0f'];
    strips.forEach((s, i) => {
        oCtx.strokeStyle = colors[i % colors.length];
        oCtx.lineWidth   = 1;
        oCtx.strokeRect(0.5, s.y * zoom + 0.5, spriteW * zoom, s.h * zoom);
    });
    if (split !== null) {
        oCtx.strokeStyle = 'rgba(255,255,255,0.3)';
        oCtx.setLineDash([4, 4]);
        oCtx.beginPath();
        oCtx.moveTo(split * zoom, 0);
        oCtx.lineTo(split * zoom, h * zoom);
        oCtx.stroke();
        oCtx.setLineDash([]);
    }
}

// ── Output ────────────────────────────────────────────────────────
function entryJson(e) {
    const b = e.base, a = e.armour;
    return `"sprite": { "sheet": "${e.sheet}", "base": { "x": ${b.x}, "y": ${b.y}, "w": ${b.w}, "h": ${b.h} }, "armour": { "x": ${a.x}, "y": ${a.y}, "w": ${a.w}, "h": ${a.h} } }`;
}

function renderEntries() {
    const out = document.getElementById('auto-results');
    out.innerHTML = '';
    entries.forEach((e, i) => {
        const json = entryJson(e);
        const div = document.createElement('div');
        div.className = 'strip-entry';
        div.innerHTML = `
            <span class="hint">click to copy</span>
            <div class="strip-label">
                <input type="text" value="${e.label}" style="background:transparent;border:none;color:#4af;font-family:monospace;font-size:10px;letter-spacing:1px;width:160px;"
                    onchange="entries[${i}].label = this.value; renderEntries();">
            </div>
            <div class="strip-json">${json}</div>
        `;
        div.addEventListener('click', ev => {
            if (ev.target.tagName === 'INPUT') return;
            navigator.clipboard.writeText(json);
            div.style.background = '#223322';
            setTimeout(() => div.style.background = '', 300);
        });
        out.appendChild(div);
    });
}

function copyAll() {
    const text = entries.map(e => `// ${e.label}\n${entryJson(e)}`).join('\n\n');
    navigator.clipboard.writeText(text);
}

function clearResults() { entries = []; renderEntries(); }
</script>
</body>
</html>
