<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Blood Bowl</title>
  <!-- STATIC_INJECT -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Welcome screen ─────────────────────────────────────── -->
<div id="screen-welcome" class="screen">
  <div id="welcome-banner"></div>
  <button onclick="onClickLocalGame();">Local Game</button>
</div>

<!-- ── Lobby screen ────────────────────────────────────────── -->
<div id="screen-lobby" class="screen hidden">
  <div id="lobby-inner">
    <h1>Lobby</h1>

    <section class="lobby-section">
      <div class="lobby-section-title">Open games</div>
      <div id="lobby-waiting-list"></div>
      <button class="lobby-create-btn" onclick="onClickCreateRoom();">+ New game</button>
    </section>

    <section class="lobby-section">
      <div class="lobby-section-title">In progress</div>
      <div id="lobby-playing-list"></div>
    </section>

    <button class="lobby-back-btn" onclick="showScreen('welcome');">← Back</button>
  </div>
</div>

<!-- ── Waiting screen ─────────────────────────────────────── -->
<div id="screen-waiting" class="screen hidden">
  <h2>Waiting for opponent…</h2>
  <p>You are: <strong id="lbl-room-side"></strong></p>
</div>

<!-- ── Game screen ────────────────────────────────────────── -->
<div id="screen-game" class="screen hidden">
<div id="layout">

  <!-- Canvas -->
  <div id="pitch-wrap">
    <canvas id="pitch"></canvas>
  </div>

  <!-- Right: info + log + actions -->
  <div class="sidebar" id="sidebar-right">

    <div class="section">
      <div id="turn-banner">
        <span id="lbl-active">HOME</span><br>
        <span class="turn-num">TURN <span id="lbl-turn">1</span></span>
      </div>
      <div id="score-banner">
        <span id="score-home" class="team-home">0</span>
        <span id="score-sep">–</span>
        <span id="score-away" class="team-away">0</span>
      </div>
      <div id="score-teams">
        <span id="lbl-home-team" class="team-home">Home</span>
        <span class="score-teams-sep"> – </span>
        <span id="lbl-away-team" class="team-away">Away</span>
      </div>
    </div>

    <div class="section" id="section-teams" hidden>
      <div class="section-title">Teams</div>
      <div id="teams-list"></div>
    </div>

    <div class="section">
      <div class="section-title">Selected</div>
      <div id="detail"><span style="color:#aaa;font-size:10px;">Click a player.</span></div>
    </div>

    <div class="section" id="section-log">
      <div class="section-title">Match Log</div>
      <div id="log"></div>
    </div>

    <div id="action-bar">
      <button id="btn-throw"         class="action-btn success"  onclick="onClickThrow();"       style="display:none;">Throw</button>
      <button id="btn-no-intercept"  class="action-btn"          onclick="onClickNoIntercept();" style="display:none;">No Intercept</button>
      <button id="btn-cancel"        class="action-btn"          onclick="onClickCancel();"      style="display:none;">Cancel</button>
      <button id="btn-stop"          class="action-btn success"  onclick="onClickStop();"        style="display:none;">Stop</button>
      <button id="btn-confirm-setup" class="action-btn success"  onclick="onClickConfirmSetup();" style="display:none;">Confirm Setup</button>
      <button id="btn-end-turn"      class="action-btn end-turn" onclick="onClickEndTurn();">End Turn</button>
    </div>

  </div>
</div>
  <!-- Mobile HUD — visible only on narrow screens (CSS) -->
  <div id="mobile-hud">
    <div id="mobile-top-bar">
      <button id="mobile-dugout-btn" onclick="toggleMobileDugout()" style="display:none"></button>
      <span id="mobile-active-label">HOME</span>
      <span id="mobile-score-label"><span id="mobile-score-home" class="team-home">0</span><span style="color:var(--text-dim)"> – </span><span id="mobile-score-away" class="team-away">0</span></span>
      <span id="mobile-turn-label">T1</span>
      <button id="mobile-log-btn" onclick="toggleMobileLog()">☰</button>
    </div>
    <div id="mobile-bottom-bar">
      <button id="mobile-btn-cancel"         class="action-btn"         onclick="onClickCancel();"        style="display:none">Cancel</button>
      <button id="mobile-btn-throw"          class="action-btn success" onclick="onClickThrow();"         style="display:none">Throw</button>
      <button id="mobile-btn-no-intercept"   class="action-btn"         onclick="onClickNoIntercept();"   style="display:none">No Intercept</button>
      <button id="mobile-btn-stop"           class="action-btn success" onclick="onClickStop();"          style="display:none">Stop</button>
      <button id="mobile-btn-confirm-setup"  class="action-btn success" onclick="onClickConfirmSetup();"  style="display:none">Confirm Setup</button>
      <button id="mobile-btn-end-turn"       class="action-btn end-turn" onclick="onClickEndTurn();">End Turn</button>
    </div>
  </div>

  <!-- Toss overlay — shown at the start of each drive -->
  <div id="toss-overlay" style="display:none;">
    <div id="toss-card">
      <div id="toss-winner-label"></div>
      <div id="toss-subtitle">Choose your role for this drive</div>
      <div id="toss-buttons">
        <button class="toss-btn" onclick="onTossChoose('kick')">Kick</button>
        <button class="toss-btn" onclick="onTossChoose('receive')">Receive</button>
      </div>
    </div>
  </div>

  <!-- Reconnect overlay — shown when opponent drops mid-game -->
  <div id="reconnect-overlay" class="hidden">
    <div id="reconnect-box">
      <div id="reconnect-msg">Opponent disconnected</div>
      <div id="reconnect-sub">Waiting for them to reconnect…</div>
    </div>
  </div>

  <!-- Mobile log panel -->
  <div id="mobile-log-panel" class="hidden">
    <div id="mobile-log-header">
      <span>Match Log</span>
      <button onclick="toggleMobileLog()">✕</button>
    </div>
    <div id="mobile-log-copy"></div>
  </div>

  <!-- Mobile dugout panel -->
  <div id="mobile-dugout-panel" class="hidden">
    <div id="mobile-dugout-header">
      <span>Teams</span>
      <button onclick="toggleMobileDugout()">✕</button>
    </div>
    <div id="mobile-dugout-body">
      <div id="mobile-teams-list"></div>
    </div>
  </div>

</div><!-- /screen-game -->

<!-- Floating chip info tooltip — shared, repositioned per chip -->
<div id="chip-tooltip" class="chip-tooltip" hidden></div>

<!-- Hidden file inputs for custom team loading -->
<input type="file" id="file-home" accept=".json" style="display:none">
<input type="file" id="file-away" accept=".json" style="display:none">

<script src="engine/state.js"></script>
<script src="engine/helpers.js"></script>
<script src="engine/core.js"></script>
<script src="engine/dice.js"></script>
<script src="engine/actions.js"></script>
<script src="engine/teams.js"></script>
<script src="engine/truth.js"></script>
<script src="client/sprites.js"></script>
<script src="client/render.js"></script>
<script src="client/input.js"></script>
<script src="client/network.js"></script>
<script src="client/game.js"></script>
<script src="client/lobby.js"></script>
<script src="client/welcome.js"></script>
<script src="client/mobile.js"></script>

<script>
  Promise.all([
      fetch('team-humans.json').then(r => r.json()),
      fetch('team-orcs.json').then(r => r.json()),
  ]).then(([home, away]) => startApp(home, away));
</script>
</body>
</html>
